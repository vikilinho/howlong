name: howlong
description: Track how long it's been. Build streaks. Break habits.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.5
  local_auth: ^2.2.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^5.0.2
  flutter_riverpod: ^2.5.1
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  flutter_animate: ^4.5.0
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.7.2
  isar_community_generator: ^3.3.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon/howlong_icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#002B24"
  adaptive_icon_foreground: "assets/app_icon/howlong_icon_1024.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
